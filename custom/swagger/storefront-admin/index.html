<!doctype html>
<html lang="en">
    <head>
        <meta charset="utf-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1" />
        <title>Storefront Admin API</title>
        <link
            rel="stylesheet"
            href="https://unpkg.com/swagger-ui-dist/swagger-ui.css"
        />
        <style>
            html,
            body {
                margin: 0;
                padding: 0;
                background: #f6f7f9;
            }
            #swagger-ui {
                max-width: 1200px;
                margin: 0 auto;
                padding: 16px 16px 48px;
            }
        </style>
    </head>
    <body>
        <div id="swagger-ui"></div>
        <script src="https://unpkg.com/swagger-ui-dist/swagger-ui-bundle.js"></script>
        <script>
            window.onload = () => {
                SwaggerUIBundle({
                    url: "/storefront/docs-admin/openapi.json",
                    dom_id: "#swagger-ui",
                    persistAuthorization: true,
                    displayRequestDuration: true,
                });
            };
        </script>
    </body>
</html>
